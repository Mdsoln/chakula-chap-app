name: chakula_chap
description: ChakulaChap — Your community food delivery app. Fast, local, trusted.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────
  flutter_bloc: ^8.1.5
  equatable: ^2.0.7

  # ── Dependency Injection ──────────────────────────────
  get_it: ^7.7.0
  injectable: ^2.4.2

  # ── Navigation ────────────────────────────────────────
  go_router: ^14.2.0
  google_maps_flutter: ^2.5.0
  flutter_polyline_points: ^2.1.0
  geolocator: ^13.0.3
  geocoding: ^3.0.0

  # ── Network ───────────────────────────────────────────
  dio: ^5.5.0
  retrofit: ^4.1.0
  pretty_dio_logger: ^1.4.0
  http: ^1.2.0

  # ── Local Storage ─────────────────────────────────────
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── Functional Programming ────────────────────────────
  dartz: ^0.10.1

  # ── Serialization ─────────────────────────────────────
  json_annotation: ^4.9.0

  # ── Animations ────────────────────────────────────────
  lottie: ^3.1.2
  animate_do: ^3.3.4
  animated_text_kit: ^4.2.2

  # ── UI Components ─────────────────────────────────────
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  gap: ^3.0.1
  pinput: ^5.0.0
  auto_size_text: ^3.0.0
  carousel_slider: ^4.2.1
  flutter_rating_bar: ^4.0.1
  flutter_spinkit: ^5.2.0

  # ── Utils ─────────────────────────────────────────────
  intl: ^0.19.0
  logger: ^2.4.0
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  uuid: ^4.5.1
  share_plus: ^10.1.0
  cupertino_icons: ^1.0.8

  # ── Payments & SMS ────────────────────────────────────
  sms_autofill: ^2.4.1
  qr_flutter: ^4.1.0

  # ── WebSocket (Order Tracking) ────────────────────────
  web_socket_channel: ^3.0.1

  # ── Firebase (Push Notifications) ────────────────────
  firebase_core: ^3.4.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  injectable_generator: ^2.6.2
  json_serializable: ^6.8.0
  retrofit_generator: 8.2.0
  hive_generator: 2.0.1
  mockito: ^5.4.4
#  flutter_launcher_icons: ^0.14.3
#  flutter_native_splash: ^2.4.5


flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/animations/
    - assets/images/
    - assets/icons/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800

